<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK1 Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
    background: #0d0d1a;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    user-select: none;
  }

  /* Animated gradient background */
  .bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0d0d1a, #1a0d2e, #0d1a2e);
    z-index: 0;
  }

  .bg-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    z-index: 0;
    animation: drift 8s ease-in-out infinite alternate;
  }

  .glow1 { width: 500px; height: 500px; background: #7b2fff; top: -100px; left: -100px; }
  .glow2 { width: 400px; height: 400px; background: #ff6b2f; bottom: -100px; right: -100px; animation-delay: 3s; }
  .glow3 { width: 300px; height: 300px; background: #2fffff; top: 50%; left: 50%; animation-delay: 5s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  /* Main layout */
  .screen {
    position: relative;
    z-index: 1;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 30px 60px;
  }

  /* Top bar */
  .topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 22px;
    border-radius: 30px;
    font-size: 1.1rem;
    letter-spacing: 2px;
  }

  .progress-wrap {
    flex: 1;
    margin: 0 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7b2fff, #ff6b2f);
    border-radius: 10px;
    transition: width 0.6s ease;
  }

  .progress-text {
    font-size: 1rem;
    opacity: 0.6;
  }

  .cat-badge {
    background: rgba(123,47,255,0.3);
    border: 1px solid rgba(123,47,255,0.5);
    padding: 8px 22px;
    border-radius: 30px;
    font-size: 1rem;
  }

  /* Card area */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 40px;
  }

  /* Phase indicator dots */
  .phase-dots {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }

  .dot.active { background: #ffd200; transform: scale(1.3); }
  .dot.done   { background: rgba(255,255,255,0.5); }

  /* Card itself */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
    min-height: 420px;
    position: relative;
  }

  .chinese {
    font-size: clamp(120px, 18vw, 220px);
    line-height: 1;
    font-weight: 900;
    text-shadow: 0 0 60px rgba(123,47,255,0.6), 0 4px 20px rgba(0,0,0,0.5);
    transition: all 0.4s ease;
  }

  .pinyin {
    font-size: clamp(52px, 7.5vw, 100px);
    letter-spacing: 4px;
    color: #ffd200;
    margin-top: 10px;
    min-height: 100px;
    transition: opacity 0.5s;
  }

  .translation-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    min-height: 140px;
    transition: opacity 0.5s;
  }

  .thai {
    font-size: clamp(50px, 7vw, 90px);
    color: #7fffd4;
    font-weight: bold;
  }

  .english {
    font-size: clamp(28px, 3.5vw, 52px);
    color: rgba(255,255,255,0.5);
    font-style: italic;
    margin-top: 6px;
  }

  .hidden { opacity: 0; pointer-events: none; }

  /* Phase label */
  .phase-label {
    font-size: 1.3rem;
    opacity: 0.5;
    letter-spacing: 2px;
    margin-top: 30px;
    min-height: 30px;
    text-transform: uppercase;
  }

  /* Timer arc */
  .timer-wrap {
    position: fixed;
    bottom: 90px;
    right: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .timer-arc svg {
    transform: rotate(-90deg);
  }

  .arc-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 5; }
  .arc-fill {
    fill: none;
    stroke: #ffd200;
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.25s linear;
  }

  .timer-num {
    position: absolute;
    font-size: 1.4rem;
    font-weight: bold;
    color: #ffd200;
  }

  /* Bottom controls */
  .bottombar {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .key-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1rem;
    opacity: 0.5;
  }

  .key {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 0.9rem;
    font-family: monospace;
  }

  .divider { opacity: 0.2; font-size: 1.2rem; }

  /* Speed indicator */
  .speed-bar {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 0.9rem;
    opacity: 0.45;
  }

  .speed-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
  }

  .speed-dot.active { background: #ffd200; transform: scale(1.5); }

  /* Paused overlay */
  .paused-badge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 20px 50px;
    font-size: 2rem;
    letter-spacing: 4px;
    display: none;
    z-index: 10;
  }

  .paused-badge.show { display: block; }

  /* Slide-in animation */
  @keyframes slideIn {
    from { transform: translateX(60px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .animate-in { animation: slideIn 0.35s ease; }
</style>
</head>

<div class="bg"></div>
<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>
<div class="bg-glow glow3"></div>
<div class="paused-badge" id="pausedBadge">⏸ หยุดชั่วคราว</div>

<div class="screen">

  <div class="card-area">

  </div>

</div>

<!-- Timer arc (fixed position) -->
<div class="timer-wrap">

    </svg>
  </div>
  <div class="timer-num" id="timerNum">5</div>
</div>

<!-- Speed bar -->
<div class="speed-bar" id="speedBar">
  เร็ว
  <div class="speed-dot" data-i="0" onclick="setSpeed(0)"></div>
  <div class="speed-dot" data-i="1" onclick="setSpeed(1)"></div>

  <div class="speed-dot" data-i="3" onclick="setSpeed(3)"></div>

</div>

  {zh:"出租车",py:"chū zū chē",th:"แท็กซี่",en:"taxi",cat:"เดินทาง"},
  {zh:"汉语",py:"Hàn yǔ",th:"ภาษาจีน",en:"Chinese language",cat:"ภาษา"},

  {zh:"天气",py:"tiān qì",th:"สภาพอากาศ",en:"weather",cat:"ภาษา"},

  {zh:"这",py:"zhè",th:"นี้",en:"this",cat:"ภาษา"},
];

// Speeds: [showSec, translateSec]
const SPEEDS = [
  [2, 2],  // เร็วมาก
  [3, 2],  // เร็ว
  [4, 3],  // ปกติ
  [6, 4],  // ช้า
  [9, 6],  // ช้ามาก
];
let speedIdx = 2;

let deck = [...HSK1];
let idx = 0;
let isPlaying = false;
let phase = 0; // 0=show char, 1=show pinyin+speak, 2=show translation
let phaseTimer = null;
let arcTimer = null;
let arcRemaining = 0;
let arcTotal = 0;
const CIRC = 176;

function setSpeed(i) {
  speedIdx = i;
  document.querySelectorAll('.speed-dot').forEach((d, j) => {
    d.classList.toggle('active', j === i);
  });
  if (isPlaying) { clearPhase(); runPhase(); }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.85;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
}

function updateCard(animate) {
  const w = deck[idx];
  const el = document.getElementById('card');
  if (animate) {
    el.classList.remove('animate-in');
    void el.offsetWidth;
    el.classList.add('animate-in');
  }
  document.getElementById('chinese').textContent = w.zh;
  document.getElementById('pinyin').textContent = w.py;
  document.getElementById('thai').textContent = w.th;
  document.getElementById('english').textContent = w.en;
  document.getElementById('catBadge').textContent = w.cat;
  document.getElementById('pFill').style.width = ((idx + 1) / deck.length * 100) + '%';
  document.getElementById('pText').textContent = `${idx + 1} / ${deck.length}`;
}

function showPhase(p) {
  phase = p;
  const pinEl = document.getElementById('pinyin');
  const trEl  = document.getElementById('translation');
  const lbl   = document.getElementById('phaseLabel');

  // Dots
  ['d0','d1','d2'].forEach((id, i) => {
    document.getElementById(id).className = 'dot' + (i === p ? ' active' : i < p ? ' done' : '');
  });

  if (p === 0) {
    pinEl.classList.add('hidden');
    trEl.classList.add('hidden');
    lbl.textContent = 'ดูตัวอักษร...';
  } else if (p === 1) {
    pinEl.classList.remove('hidden');
    trEl.classList.add('hidden');
    lbl.textContent = 'ฟังเสียง...';
    speak(deck[idx].zh);
  } else {
    pinEl.classList.remove('hidden');
    trEl.classList.remove('hidden');
    lbl.textContent = 'คำแปล';
  }
}

function startArc(seconds) {
  arcTotal = seconds;
  arcRemaining = seconds;
  document.getElementById('timerNum').textContent = seconds;
  document.getElementById('arcFill').style.strokeDashoffset = 0;

  clearInterval(arcTimer);
  const interval = 100;
  const totalMs = seconds * 1000;
  let elapsed = 0;

  arcTimer = setInterval(() => {
    elapsed += interval;
    const progress = elapsed / totalMs;
    document.getElementById('arcFill').style.strokeDashoffset = CIRC * progress;
    const sLeft = Math.ceil((totalMs - elapsed) / 1000);
    document.getElementById('timerNum').textContent = sLeft > 0 ? sLeft : '';
    if (elapsed >= totalMs) clearInterval(arcTimer);
  }, interval);
}

function clearPhase() {
  clearTimeout(phaseTimer);
  clearInterval(arcTimer);
}

function runPhase() {
  if (!isPlaying) return;
  const [showSec, transSec] = SPEEDS[speedIdx];

  if (phase === 0) {
    startArc(showSec);
    phaseTimer = setTimeout(() => { showPhase(1); runPhase(); }, showSec * 1000);
  } else if (phase === 1) {
    startArc(transSec);
    phaseTimer = setTimeout(() => { showPhase(2); runPhase(); }, transSec * 1000);
  } else {
    const total = showSec + transSec;
    startArc(total);
    phaseTimer = setTimeout(() => { advance(1); }, total * 1000);
  }
}

function advance(dir) {
  clearPhase();
  idx = (idx + dir + deck.length) % deck.length;
  phase = 0;
  updateCard(dir > 0);
  showPhase(0);
  if (isPlaying) runPhase();
}

function togglePlay() {
  isPlaying = !isPlaying;
  const badge = document.getElementById('pausedBadge');
  if (!isPlaying) {
    clearPhase();
    window.speechSynthesis && window.speechSynthesis.cancel();
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 1500);
    document.getElementById('timerNum').textContent = '⏸';
    document.getElementById('arcFill').style.strokeDashoffset = 0;
    document.getElementById('phaseLabel').textContent = 'หยุดชั่วคราว';
  } else {
    badge.classList.remove('show');
    runPhase();
  }
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  phase = 0;
  updateCard(false);
  showPhase(0);
  clearPhase();
  if (isPlaying) runPhase();
}

// Keyboard — TV remote sends these
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowRight':
    case 'MediaFastForward':
      e.preventDefault(); advance(1); break;
    case 'ArrowLeft':
    case 'MediaRewind':
      e.preventDefault(); advance(-1); break;
    case 'ArrowUp':
      e.preventDefault(); setSpeed(Math.max(0, speedIdx - 1)); break;
    case 'ArrowDown':
      e.preventDefault(); setSpeed(Math.min(4, speedIdx + 1)); break;
    case 'Enter':
    case ' ':
    case 'MediaPlay':
    case 'MediaPlayPause':
      e.preventDefault(); togglePlay(); break;
    case 's':
    case 'S':
      shuffle(); break;
  }
});

// Init — เริ่มหยุด รอให้กด OK
updateCard(false);
showPhase(0);
document.getElementById('timerNum').textContent = '▶';
document.getElementById('phaseLabel').textContent = 'กด OK เพื่อเริ่ม';
</script>
