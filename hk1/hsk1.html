<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK1 Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
    background: #0d0d1a;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    user-select: none;
  }

  /* Animated gradient background */
  .bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0d0d1a, #1a0d2e, #0d1a2e);
    z-index: 0;
  }

  .bg-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    z-index: 0;
    animation: drift 8s ease-in-out infinite alternate;
  }

  .glow1 { width: 500px; height: 500px; background: #7b2fff; top: -100px; left: -100px; opacity: 0.18; }
  .glow2 { width: 400px; height: 400px; background: #ff6b2f; bottom: -100px; right: -100px; animation-delay: 3s; opacity: 0.12; }
  .glow3 { width: 300px; height: 300px; background: #2fffff; top: 50%; left: 50%; animation-delay: 5s; opacity: 0.07; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  /* =====================
     LAYOUT — Mobile first
  ===================== */
  .screen {
    position: relative;
    z-index: 1;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
  }

  /* Top bar */
  .topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .progress-wrap {
    flex: 1;
    margin: 0 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .progress-bar {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7b2fff, #ff6b2f);
    border-radius: 10px;
    transition: width 0.6s ease;
  }

  .progress-text { font-size: 0.8rem; opacity: 0.6; }

  .cat-badge {
    background: rgba(123,47,255,0.3);
    border: 1px solid rgba(123,47,255,0.5);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 0.8rem;
    white-space: nowrap;
  }

  /* Card area */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  /* Phase dots */
  .phase-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }

  .dot.active { background: #ffd200; transform: scale(1.3); }
  .dot.done   { background: rgba(255,255,255,0.5); }

  /* Card */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  /* === Font sizes: Mobile === */
  .chinese {
    font-size: clamp(80px, 24vw, 120px);
    line-height: 1;
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 0 60px rgba(180,140,255,0.5), 0 2px 12px rgba(0,0,0,0.5);
    transition: all 0.4s ease;
  }

  .pinyin {
    font-size: clamp(40px, 12vw, 60px);
    letter-spacing: 3px;
    color: #ffd200;
    margin-top: 10px;
    min-height: 50px;
    transition: opacity 0.5s;
    text-shadow: 0 0 24px rgba(255,210,0,0.6);
  }

  .translation-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    gap: 6px;
    transition: opacity 0.5s;
  }

  .thai {
    font-size: clamp(24px, 6.5vw, 38px);
    color: #7fffd4;
    font-weight: bold;
    text-align: center;
    text-shadow: 0 0 24px rgba(127,255,212,0.5);
  }

  .thpy {
    font-size: clamp(36px, 10vw, 56px);
    color: rgba(255,220,100,0.75);
    text-align: center;
    letter-spacing: 1px;
  }

  .english {
    font-size: clamp(14px, 3.5vw, 18px);
    color: rgba(255,255,255,0.4);
    font-style: italic;
    margin-top: 2px;
    text-align: center;
  }

  .hidden { opacity: 0; pointer-events: none; }

  .phase-label { display: none; }

  /* Swipe hint — mobile only */
  .swipe-hint {
    font-size: 0.75rem;
    opacity: 0.3;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* Timer arc — hidden */
  .timer-wrap {
    display: none;
  }

  .timer-arc svg { transform: rotate(-90deg); }

  .arc-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 4; }
  .arc-fill {
    fill: none;
    stroke: #ffd200;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.25s linear;
  }

  .timer-num {
    position: absolute;
    font-size: 0.9rem;
    font-weight: bold;
    color: #ffd200;
  }

  /* Bottom controls */
  .bottombar {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    align-items: center;
    flex-wrap: nowrap;
    margin-bottom: 4px;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 50px;
    padding: 12px 18px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 48px;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .ctrl-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.3); }

  .play-btn {
    background: linear-gradient(135deg, #7b2fff, #f7971e);
    border: none;
    padding: 14px 32px;
    font-size: 1.1rem;
    font-weight: bold;
    flex: 1;
    max-width: 200px;
  }

  /* Speed bar */
  .speed-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 0.75rem;
    opacity: 0.4;
    margin-bottom: 2px;
  }

  .speed-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
    min-width: 20px; min-height: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  .speed-dot::after {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }

  .speed-dot.active::after { background: #ffd200; transform: scale(1.5); }

  /* Key hints — hidden on small screens */
  .keyhints { display: none; }

  /* Paused overlay */
  .paused-badge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.75);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 16px 36px;
    font-size: 1.5rem;
    letter-spacing: 3px;
    display: none;
    z-index: 10;
  }

  .paused-badge.show { display: block; }

  @keyframes slideIn {
    from { transform: translateX(60px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .animate-in { animation: slideIn 0.35s ease; }

  /* =====================
     TABLET — 600px+
  ===================== */
  @media (min-width: 600px) {
    .screen { padding: 20px 36px 16px; }
    .badge, .cat-badge { font-size: 0.95rem; padding: 7px 18px; }
    .chinese { font-size: clamp(100px, 18vw, 160px); }
    .pinyin  { font-size: clamp(50px, 8vw, 76px); min-height: 70px; }
    .thai    { font-size: clamp(28px, 4vw, 44px); }
    .thpy    { font-size: clamp(44px, 6vw, 68px); }
    .english { font-size: clamp(14px, 2vw, 20px); }
    .play-btn { font-size: 1.2rem; padding: 15px 40px; }
    .ctrl-btn { padding: 13px 22px; font-size: 1.1rem; }
  }

  /* =====================
     TV / Desktop — 1024px+ landscape
  ===================== */
  @media (min-width: 1024px) and (orientation: landscape) {
    .screen { padding: 28px 60px 20px; }
    .badge { font-size: 1.1rem; padding: 8px 22px; letter-spacing: 2px; }
    .cat-badge { font-size: 1rem; padding: 8px 22px; }
    .progress-text { font-size: 1rem; }
    .progress-wrap { margin: 0 30px; }

    .chinese { font-size: clamp(140px, 17vw, 210px); }
    .pinyin  { font-size: clamp(72px, 8.5vw, 110px); min-height: 100px; }
    .thai    { font-size: clamp(36px, 4vw, 56px); }
    .thpy    { font-size: clamp(60px, 6.5vw, 90px); }
    .english { font-size: clamp(16px, 2vw, 24px); }
    .phase-label { font-size: 1.2rem; margin-top: 28px; }

    .ctrl-btn { padding: 14px 28px; font-size: 1.2rem; }
    .play-btn { font-size: 1.4rem; padding: 16px 52px; }
    .bottombar { gap: 16px; }

    .timer-wrap { top: auto; bottom: 90px; right: 60px; }
    .timer-arc svg { width: 70px; height: 70px; }
    .timer-num { font-size: 1.4rem; }

    .keyhints {
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 4px;
      opacity: 0.35;
    }

    .key-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }

    .key {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-family: monospace;
    }

    .divider { opacity: 0.2; }
    .swipe-hint { display: none; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>
<div class="bg-glow glow3"></div>
<div class="paused-badge" id="pausedBadge">⏸ หยุดชั่วคราว</div>

<div class="screen">

  <!-- Top bar -->
  <div class="topbar">
    <div class="badge">HSK 1</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
      <div class="progress-text" id="pText">1 / 150</div>
    </div>
    <div class="cat-badge" id="catBadge">ทั้งหมด</div>
  </div>

  <!-- Card area -->
  <div class="card-area">
    <div class="card" id="card">
      <div class="chinese" id="chinese">你</div>
      <div class="pinyin" id="pinyin">nǐ</div>
      <div class="translation-wrap" id="translation">
        <div class="thpy" id="thpy">(นี่)</div>
        <div class="thai" id="thai">คุณ / เธอ</div>
        <div class="english" id="english">you</div>
      </div>
    </div>
  </div>

  <!-- Clickable controls -->
  <div class="bottombar">
    <button class="ctrl-btn" onclick="advance(-1)">◀</button>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶ เริ่ม</button>
    <button class="ctrl-btn" onclick="advance(1)">▶▶</button>
  </div>
  <!-- Key hints -->
  <div class="keyhints">
    <div class="key-hint"><span class="key">←</span><span class="key">→</span> เปลี่ยนใบ</div>
    <div class="divider">|</div>
    <div class="key-hint"><span class="key">Enter</span> เล่น/หยุด</div>
    <div class="divider">|</div>
    <div class="key-hint"><span class="key">↑</span><span class="key">↓</span> ความเร็ว</div>
  </div>

</div>

<!-- Timer arc (fixed position) -->
<div class="timer-wrap">
  <div class="timer-arc">
    <svg width="70" height="70" viewBox="0 0 70 70">
      <circle class="arc-bg" cx="35" cy="35" r="28"/>
      <circle class="arc-fill" id="arcFill" cx="35" cy="35" r="28"
        stroke-dasharray="176" stroke-dashoffset="0"/>
    </svg>
  </div>
  <div class="timer-num" id="timerNum">5</div>
</div>

<!-- Speed bar -->
<div class="speed-bar" id="speedBar">
  เร็ว
  <div class="speed-dot" data-i="0" onclick="setSpeed(0)"></div>
  <div class="speed-dot" data-i="1" onclick="setSpeed(1)"></div>
  <div class="speed-dot active" data-i="2" onclick="setSpeed(2)"></div>
  <div class="speed-dot" data-i="3" onclick="setSpeed(3)"></div>
  <div class="speed-dot" data-i="4" onclick="setSpeed(4)"></div>
  ช้า
</div>

<script>
// วินาทีต่อใบ
const SPEEDS = [2, 3, 5, 8, 12];
let speedIdx = 1; // default 3 วิ

let deck = [];
let idx = 0;
let isPlaying = false;
let phaseTimer = null;

function setSpeed(i) {
  speedIdx = i;
  document.querySelectorAll('.speed-dot').forEach((d, j) => {
    d.classList.toggle('active', j === i);
  });
  if (isPlaying) { clearPhase(); runPhase(); }
}


function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.85;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
}

function updateCard(animate) {
  const w = deck[idx];
  const el = document.getElementById('card');
  if (animate) {
    el.classList.remove('animate-in');
    void el.offsetWidth;
    el.classList.add('animate-in');
  }
  document.getElementById('chinese').textContent = w.zh;
  document.getElementById('pinyin').textContent = w.py;
  document.getElementById('thai').textContent = w.th;
  document.getElementById('thpy').textContent = w.tp || '';
  document.getElementById('english').textContent = w.en;
  document.getElementById('catBadge').textContent = w.cat;
  document.getElementById('pFill').style.width = ((idx + 1) / deck.length * 100) + '%';
  document.getElementById('pText').textContent = `${idx + 1} / ${deck.length}`;
}

function clearPhase() {
  clearTimeout(phaseTimer);
}

function runPhase() {
  if (!isPlaying) return;
  speak(deck[idx].zh);
  phaseTimer = setTimeout(() => { advance(1); }, SPEEDS[speedIdx] * 1000);
}

function advance(dir) {
  clearPhase();
  idx = (idx + dir + deck.length) % deck.length;
  updateCard(dir > 0);
  if (isPlaying) runPhase();
}

function togglePlay() {
  isPlaying = !isPlaying;
  const badge = document.getElementById('pausedBadge');
  if (!isPlaying) {
    clearPhase();
    window.speechSynthesis && window.speechSynthesis.cancel();
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 1500);
    document.getElementById('playBtn').textContent = '▶ เริ่ม';
  } else {
    badge.classList.remove('show');
    document.getElementById('playBtn').textContent = '⏸ หยุด';
    runPhase();
  }
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  updateCard(false);
  clearPhase();
  if (isPlaying) runPhase();
}

// Keyboard — TV remote / desktop
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowRight':
    case 'MediaFastForward':
      e.preventDefault(); advance(1); break;
    case 'ArrowLeft':
    case 'MediaRewind':
      e.preventDefault(); advance(-1); break;
    case 'ArrowUp':
      e.preventDefault(); setSpeed(Math.max(0, speedIdx - 1)); break;
    case 'ArrowDown':
      e.preventDefault(); setSpeed(Math.min(4, speedIdx + 1)); break;
    case 'Enter':
    case ' ':
    case 'MediaPlay':
    case 'MediaPlayPause':
      e.preventDefault(); togglePlay(); break;
    case 's':
    case 'S':
      shuffle(); break;
  }
});

// Touch / Swipe — Mobile & Tablet
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return; // too small = tap
  if (Math.abs(dx) > Math.abs(dy)) {
    // horizontal swipe
    if (dx < -40) advance(1);   // swipe left = next
    if (dx >  40) advance(-1);  // swipe right = prev
  } else {
    // vertical swipe
    if (dy < -40) setSpeed(Math.max(0, speedIdx - 1));  // swipe up = faster
    if (dy >  40) setSpeed(Math.min(4, speedIdx + 1));  // swipe down = slower
  }
}, { passive: true });

// Init — โหลดข้อมูลจาก JSON
fetch('hsk1-data.json')
  .then(r => r.json())
  .then(data => {
    deck = data;
    shuffle();
  })
  .catch(err => console.error('โหลด hsk1-data.json ไม่ได้:', err));
</script>
</body>
</html>
