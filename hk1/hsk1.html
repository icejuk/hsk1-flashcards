<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HSK1">
<meta name="theme-color" content="#7b2fff">
<link rel="manifest" href="manifest.json">
<title>HSK1 Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
    background: #0d0d1a;
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    user-select: none;
  }

  /* Animated gradient background */
  .bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0d0d1a, #1a0d2e, #0d1a2e);
    z-index: 0;
  }

  .bg-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    z-index: 0;
    animation: drift 8s ease-in-out infinite alternate;
  }

  .glow1 { width: 500px; height: 500px; background: #7b2fff; top: -100px; left: -100px; opacity: 0.18; }
  .glow2 { width: 400px; height: 400px; background: #ff6b2f; bottom: -100px; right: -100px; animation-delay: 3s; opacity: 0.12; }
  .glow3 { width: 300px; height: 300px; background: #2fffff; top: 50%; left: 50%; animation-delay: 5s; opacity: 0.07; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  /* =====================
     LAYOUT — Mobile first
  ===================== */
  .screen {
    position: relative;
    z-index: 1;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }

  /* Top bar */
  .topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .progress-wrap {
    flex: 1;
    margin: 0 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .progress-bar {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7b2fff, #ff6b2f);
    border-radius: 10px;
    transition: width 0.25s ease;
  }

  .progress-text { font-size: 0.8rem; opacity: 0.6; }

  .cat-badge {
    background: rgba(123,47,255,0.3);
    border: 1px solid rgba(123,47,255,0.5);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 0.8rem;
    white-space: nowrap;
  }

  /* Card area */
  .card-area {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    overflow: hidden;
  }

  /* Phase dots */
  .phase-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }

  .dot.active { background: #ffd200; transform: scale(1.3); }
  .dot.done   { background: rgba(255,255,255,0.5); }

  /* Card */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  /* === Font sizes: Mobile === */
  .chinese {
    font-size: clamp(36px, 10vw, 120px);
    line-height: 1.2;
    font-weight: 900;
    color: #ffffff;
    text-align: center;
    word-break: break-word;
    text-shadow: 0 0 60px rgba(180,140,255,0.5), 0 2px 12px rgba(0,0,0,0.5);
    transition: all 0.4s ease;
  }

  /* ประโยค — ข้อความยาว ย่อ font */
  .chinese.sentence {
    font-size: clamp(28px, 6vw, 52px);
    letter-spacing: 2px;
  }

  .pinyin {
    font-size: clamp(40px, 12vw, 60px);
    letter-spacing: 3px;
    color: #ffd200;
    margin-top: 10px;
    min-height: 50px;
    transition: opacity 0.5s;
    text-shadow: 0 0 24px rgba(255,210,0,0.6);
  }

  .translation-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 5px;
    gap: 6px;
    transition: opacity 0.5s;
  }

  .thai {
    font-size: clamp(24px, 6.5vw, 38px);
    color: #7fffd4;
    font-weight: bold;
    text-align: center;
    text-shadow: 0 0 24px rgba(127,255,212,0.5);
  }

  .thpy {
    font-size: clamp(36px, 10vw, 56px);
    color: rgba(255,220,100,0.75);
    text-align: center;
    letter-spacing: 1px;
  }

  .english {
    font-size: clamp(14px, 3.5vw, 18px);
    color: rgba(255,255,255,0.4);
    font-style: italic;
    margin-top: 2px;
    text-align: center;
  }

  .hidden { opacity: 0; pointer-events: none; }

  .phase-label { display: none; }

  /* Swipe hint — mobile only */
  .swipe-hint {
    font-size: 0.75rem;
    opacity: 0.3;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* Timer arc — hidden */
  .timer-wrap {
    display: none;
  }

  .timer-arc svg { transform: rotate(-90deg); }

  .arc-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 4; }
  .arc-fill {
    fill: none;
    stroke: #ffd200;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.25s linear;
  }

  .timer-num {
    position: absolute;
    font-size: 0.9rem;
    font-weight: bold;
    color: #ffd200;
  }

  /* Bottom controls */
  .bottombar {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 10px;
    align-items: center;
    flex-wrap: nowrap;
    margin-bottom: 4px;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 50px;
    padding: 10px 14px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .ctrl-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.3); }

  .play-btn {
    background: linear-gradient(135deg, #7b2fff, #f7971e);
    border: none;
    padding: 11px 28px;
    font-size: 1rem;
    font-weight: bold;
    flex: 1;
    max-width: 200px;
  }

  /* Speed bar */
  .speed-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    opacity: 0.4;
    margin-top: 4px;
    width: 100%;
  }

  .speed-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
    min-width: 20px; min-height: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  .speed-dot::after {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }

  .speed-dot.active::after { background: #ffd200; transform: scale(1.5); }

  /* Key hints — hidden on small screens */
  .keyhints { display: none; }

  /* Paused overlay */
  .paused-badge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.75);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 16px 36px;
    font-size: 1.5rem;
    letter-spacing: 3px;
    display: none;
    z-index: 10;
  }

  .paused-badge.show { display: block; }

  @keyframes slideIn {
    from { transform: translateX(60px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .animate-in { animation: slideIn 0.35s ease; }

  /* =====================
     LANDSCAPE เตี้ย — มือถือแนวนอน (max-height: 500px)
  ===================== */
  @media (orientation: landscape) and (max-height: 500px) {
    .screen {
      padding: 4px 12px;
      padding-bottom: max(4px, env(safe-area-inset-bottom));
      gap: 2px;
    }
    .topbar { gap: 6px; }
    .badge, .cat-badge { font-size: 0.7rem; padding: 3px 10px; }
    .progress-text { font-size: 0.65rem; }
    .progress-bar { height: 3px; }
    .progress-wrap { margin: 0 6px; gap: 2px; }

    .chinese          { font-size: clamp(28px, 7vh, 60px); }
    .chinese.sentence { font-size: clamp(20px, 5vh, 36px); letter-spacing: 1px; }
    .pinyin           { font-size: clamp(18px, 5vh, 36px); min-height: 0; margin-top: 2px; letter-spacing: 1px; }
    .thai             { font-size: clamp(14px, 4vh, 22px); }
    .thpy             { font-size: clamp(16px, 4.5vh, 28px); }
    .english          { font-size: clamp(10px, 2.5vh, 14px); margin-top: 0; }
    .translation-wrap { margin-top: 2px; gap: 2px; }

    .ctrl-btn { padding: 5px 10px; font-size: 0.85rem; min-width: 36px; min-height: 36px; }
    .play-btn { padding: 6px 18px; font-size: 0.9rem; max-width: 160px; }
    .bottombar { gap: 8px; margin-bottom: 2px; }

    .speed-bar { font-size: 0.65rem; margin-top: 2px; gap: 5px; }
    .speed-dot { min-width: 16px; min-height: 16px; }
    .speed-dot::after { width: 5px; height: 5px; }
    .swipe-hint { display: none; }
  }

  /* =====================
     TABLET — 600px+
  ===================== */
  @media (min-width: 600px) {
    .screen { padding: 20px 36px 16px; }
    .badge, .cat-badge { font-size: 0.95rem; padding: 7px 18px; }
    .chinese { font-size: clamp(100px, 18vw, 160px); }
    .pinyin  { font-size: clamp(50px, 8vw, 76px); min-height: 70px; }
    .thai    { font-size: clamp(28px, 4vw, 44px); }
    .thpy    { font-size: clamp(44px, 6vw, 68px); }
    .english { font-size: clamp(14px, 2vw, 20px); }
    .play-btn { font-size: 1.2rem; padding: 15px 40px; }
    .ctrl-btn { padding: 13px 22px; font-size: 1.1rem; }
  }

  /* =====================
     TV / Desktop — 1024px+ landscape
     (เผื่อ overscan ของ TV ประมาณ 5% รอบขอบ)
  ===================== */
  @media (min-width: 1024px) and (orientation: landscape) {
    .screen {
      padding: 3vh 5vw 2vh;
      padding-bottom: max(2vh, env(safe-area-inset-bottom));
      gap: 1vh;
    }
    .badge { font-size: 1.1rem; padding: 8px 22px; letter-spacing: 2px; }
    .cat-badge { font-size: 1rem; padding: 8px 22px; }
    .progress-text { font-size: 1rem; }
    .progress-wrap { margin: 0 30px; }

    .chinese { font-size: clamp(100px, 13vw, 170px); }
    .chinese.sentence { font-size: clamp(60px, 7vw, 100px); letter-spacing: 4px; }
    .pinyin  { font-size: clamp(50px, 6.5vw, 84px); min-height: 70px; }
    .thai    { font-size: clamp(28px, 3.2vw, 44px); }
    .thpy    { font-size: clamp(44px, 5vw, 64px); }
    .english { font-size: clamp(14px, 1.6vw, 20px); }
    .phase-label { font-size: 1.2rem; margin-top: 28px; }

    .ctrl-btn { padding: 12px 22px; font-size: 1.1rem; }
    .play-btn { font-size: 1.3rem; padding: 14px 44px; }
    .bottombar { gap: 16px; margin-bottom: 6px; }

    .timer-wrap { top: auto; bottom: 90px; right: 60px; }
    .timer-arc svg { width: 70px; height: 70px; }
    .timer-num { font-size: 1.4rem; }

    .keyhints {
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 4px;
      opacity: 0.35;
    }

    .key-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }

    .key {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-family: monospace;
    }

    .divider { opacity: 0.2; }
    .swipe-hint { display: none; }
    .speed-bar { font-size: 0.9rem; }
    .speed-dot { min-width: 24px; min-height: 24px; }
  }

  /* =====================
     TV ใหญ่มาก — 1600px+ ใช้ overscan เพิ่ม
  ===================== */
  @media (min-width: 1600px) and (orientation: landscape) {
    .screen {
      padding: 5vh 7vw 4vh;
      padding-bottom: max(4vh, env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>
<div class="bg-glow glow3"></div>
<div class="paused-badge" id="pausedBadge">⏸ หยุดชั่วคราว</div>

<div class="screen">

  <!-- Top bar -->
  <div class="topbar">
    <div class="badge">HSK 1</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
      <div class="progress-text" id="pText">1 / 150</div>
    </div>
    <div class="cat-badge" id="catBadge">ทั้งหมด</div>
  </div>

  <!-- Card area -->
  <div class="card-area">
    <div class="card" id="card">
      <div class="chinese" id="chinese">你</div>
      <div class="pinyin" id="pinyin">nǐ</div>
      <div class="translation-wrap" id="translation">
        <div class="thpy" id="thpy">(นี่)</div>
        <div class="thai" id="thai">คุณ / เธอ</div>
        <div class="english" id="english">you</div>
      </div>
    </div>
  </div>

  <!-- Clickable controls -->
  <div class="bottombar">
    <button class="ctrl-btn" onclick="advance(-1)">◀</button>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶ เริ่ม</button>
    <button class="ctrl-btn" onclick="advance(1)">▶▶</button>
  </div>

  <!-- Speed bar -->
  <div class="speed-bar" id="speedBar">
    เร็ว
    <div class="speed-dot" data-i="0" onclick="setSpeed(0)"></div>
    <div class="speed-dot" data-i="1" onclick="setSpeed(1)"></div>
    <div class="speed-dot active" data-i="2" onclick="setSpeed(2)"></div>
    <div class="speed-dot" data-i="3" onclick="setSpeed(3)"></div>
    <div class="speed-dot" data-i="4" onclick="setSpeed(4)"></div>
    ช้า
  </div>

  <!-- Key hints -->
  <div class="keyhints">
    <div class="key-hint"><span class="key">←</span><span class="key">→</span> เปลี่ยนใบ</div>
    <div class="divider">|</div>
    <div class="key-hint"><span class="key">Enter</span> เล่น/หยุด</div>
    <div class="divider">|</div>
    <div class="key-hint"><span class="key">↑</span><span class="key">↓</span> ความเร็ว</div>
  </div>

</div>

<!-- Timer arc (fixed position) -->
<div class="timer-wrap">
  <div class="timer-arc">
    <svg width="70" height="70" viewBox="0 0 70 70">
      <circle class="arc-bg" cx="35" cy="35" r="28"/>
      <circle class="arc-fill" id="arcFill" cx="35" cy="35" r="28"
        stroke-dasharray="176" stroke-dashoffset="0"/>
    </svg>
  </div>
  <div class="timer-num" id="timerNum">5</div>
</div>

<script src="hsk1-data.js"></script>
<script>
// ความเร็วในการพูด (TTS rate) — ซ้าย=เร็ว, ขวา=ช้า
const RATES = [1.0, 0.8, 0.6, 0.45, 0.3];
let speedIdx = 2; // default 0.6 (ช้าลง พูดชัด)
// วินาทีต่อใบ
const CARD_SECONDS = 5;
// ระยะห่างระหว่างพูดรอบ 1 → รอบ 2
const REPEAT_GAP_MS = 2200;

let deck = [];
let idx = 0;
let isPlaying = false;
let phaseTimer = null;
let repeatTimer = null;

function setSpeed(i) {
  speedIdx = i;
  document.querySelectorAll('.speed-dot').forEach((d, j) => {
    d.classList.toggle('active', j === i);
  });
}


// Cache เสียงที่เลือก เพื่อไม่ต้องค้นหาทุกครั้ง
let zhVoice = null;

function pickVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  // เน้น Mandarin (zh-CN) ผู้หญิงและคม
  const zhVoices = voices.filter(v =>
    v.lang && (v.lang.toLowerCase().startsWith('zh-cn') || v.lang.toLowerCase() === 'zh')
  );
  if (!zhVoices.length) return null;

  // จัดลำดับความชอบ — ชื่อเสียงผู้หญิงที่คมและดังกว่า
  const preferOrder = [
    'tingting', 'ting-ting',           // Mac classic ✨ คมสุด
    'meijia', 'mei-jia',                // Mac Taiwan female
    'xiaoxiao', 'yaoyao',               // Edge/Win female
    'sandy', 'shelley', 'flo',          // Mac newer female
    'google.*female', 'female', 'woman' // generic female
  ];
  for (const pat of preferOrder) {
    const re = new RegExp(pat, 'i');
    const found = zhVoices.find(v => re.test(v.name));
    if (found) return found;
  }
  return zhVoices[0];
}

// โหลดเสียงเมื่อ available (Chrome โหลด async)
function loadVoice() {
  zhVoice = pickVoice();
}
loadVoice();
window.speechSynthesis.onvoiceschanged = loadVoice;

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  if (zhVoice) u.voice = zhVoice;
  u.rate = RATES[speedIdx];
  u.pitch = 1.25;   // pitch สูงขึ้น = ฟังคมกว่า
  u.volume = 1.0;
  window.speechSynthesis.speak(u);
}

function updateCard(animate) {
  const w = deck[idx];
  const el = document.getElementById('card');
  if (animate) {
    el.classList.remove('animate-in');
    void el.offsetWidth;
    el.classList.add('animate-in');
  }
  const chEl = document.getElementById('chinese');
  chEl.textContent = w.zh;
  chEl.classList.toggle('sentence', w.zh.length > 4);
  document.getElementById('pinyin').textContent = w.py;
  document.getElementById('thai').textContent = w.th;
  document.getElementById('thpy').textContent = w.tp || '';
  document.getElementById('english').textContent = w.en;
  document.getElementById('catBadge').textContent = w.cat;
  document.getElementById('pFill').style.width = ((idx + 1) / deck.length * 100) + '%';
  document.getElementById('pText').textContent = `${idx + 1} / ${deck.length}`;
}

function clearPhase() {
  clearTimeout(phaseTimer);
  clearTimeout(repeatTimer);
}

function runPhase() {
  if (!isPlaying) return;
  const text = deck[idx].zh;
  speak(text);
  // พูดรอบที่ 2
  repeatTimer = setTimeout(() => { if (isPlaying) speak(text); }, REPEAT_GAP_MS);
  phaseTimer = setTimeout(() => { advance(1); }, CARD_SECONDS * 1000);
}

function advance(dir) {
  clearPhase();
  idx = (idx + dir + deck.length) % deck.length;
  updateCard(dir > 0);
  if (isPlaying) runPhase();
}

function togglePlay() {
  isPlaying = !isPlaying;
  const badge = document.getElementById('pausedBadge');
  if (!isPlaying) {
    clearPhase();
    window.speechSynthesis && window.speechSynthesis.cancel();
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 1500);
    document.getElementById('playBtn').textContent = '▶ เริ่ม';
  } else {
    badge.classList.remove('show');
    document.getElementById('playBtn').textContent = '⏸ หยุด';
    runPhase();
  }
}

function shuffle() {
  // จัดกลุ่ม: คู่ตรงข้ามรวมเป็น chunk 2 ใบ — sang อื่นเป็น chunk 1 ใบ
  const groups = [];
  let i = 0;
  while (i < HSK1_DATA.length) {
    const cur = HSK1_DATA[i];
    const nxt = HSK1_DATA[i + 1];
    if (cur.cat === 'คู่ตรงข้าม' && nxt && nxt.cat === 'คู่ตรงข้าม') {
      groups.push([cur, nxt]);  // คู่ตรงข้าม → 2-card chunk
      i += 2;
    } else {
      groups.push([cur]);
      i++;
    }
  }
  // Fisher-Yates shuffle ระดับ chunk
  for (let g = groups.length - 1; g > 0; g--) {
    const r = Math.floor(Math.random() * (g + 1));
    [groups[g], groups[r]] = [groups[r], groups[g]];
  }
  deck = groups.flat();
  idx = 0;
  updateCard(false);
  clearPhase();
  if (isPlaying) runPhase();
}

// Keyboard — TV remote / desktop
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowRight':
    case 'MediaFastForward':
      e.preventDefault(); advance(1); break;
    case 'ArrowLeft':
    case 'MediaRewind':
      e.preventDefault(); advance(-1); break;
    case 'ArrowUp':
      e.preventDefault(); setSpeed(Math.max(0, speedIdx - 1)); break;
    case 'ArrowDown':
      e.preventDefault(); setSpeed(Math.min(4, speedIdx + 1)); break;
    case 'Enter':
    case ' ':
    case 'MediaPlay':
    case 'MediaPlayPause':
      e.preventDefault(); togglePlay(); break;
    case 's':
    case 'S':
      shuffle(); break;
  }
});

// Touch / Swipe — Mobile & Tablet
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return; // too small = tap
  if (Math.abs(dx) > Math.abs(dy)) {
    // horizontal swipe
    if (dx < -40) advance(1);    // swipe left = next
    if (dx >  40) advance(-1);   // swipe right = prev
  } else {
    // vertical swipe
    if (dy < -40) advance(1);    // swipe up = next
    if (dy >  40) advance(-1);   // swipe down = prev
  }
}, { passive: true });

// Init — โหลดข้อมูลจากตัวแปร HSK1_DATA (hsk1-data.js)
deck = HSK1_DATA;
shuffle();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/hsk1-flashcards/hk1/sw.js');
}
</script>
